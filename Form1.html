<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXEMPLO 01 - FORMULARIO</title>
    <style type="text/css">
        label{
        display:inline-block;
        width: 150px;
    }
    input[type="text"]
        {   
        background-color: yellow;
        font-weight: bold;
        border-radius: 20px;
        padding: 0px 20px;
        height: 30px;
        }

    </style>
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>Dados pessoais</legend>
            <label>Nome:</label>
            <input name="nome" type="text" maxlength="40" size="40" placeholder="Nome"/>
            <br><br>

            <label>Senha (4 caracteres):</label>
            <input name="senha" type="password" maxlength="4" size="4"/>
            <br><br>

            <label>Escolha os itens aplicaveis</label>
            <input name="video" type="checkbox" />Placa de videos
            <input name="memoria" type="checkbox" />Memoria
            <input name="caixa" type="checkbox" />Caixa de som
            <br><br>

            <label>Sexo</label>
            <label>
                <input name="sexo" type="radio" value="M"/>Masculino
            </label>
            <label>
                <input name="sexo" type="radio" value="F"/>Feminino
            </label>
            <label>
                <input name="sexo" type="radio" value="o"/>Outros
            </label>
            <br><br>

            <label>Estado civil</label>
            <label>
                <input name="civil" type="radio" value="S"/>Solteiro(a)
            </label>
            <label>
                <input name="civil" type="radio" value="C"/>Casado(a)
            </label>
            <label>
                <input name="civil" type="radio" value="V"/>Viúvo(a)
            </label>
            <br><br>
        </fieldset>
<br><br>
        <fieldset>
            <legend>Estado</legend>
            <select name="estado">
                <option>Parana</option>
                <option>São Paulo</option>
                <option>Santa Catarina</option>
            </select>
        </fieldset>
        <br><br>

        <label>Suco</label>
        <select>
            <optgroup label="fruta">
            <option>Laranja</option>
            <option>Abacaxi</option>
            <option>Morango</option>
        </optgroup>

        <optgroup label="mistura">
            <option>Agua</option>
            <option>Leite</option>
        </optgroup>
        </select>
        <br><br>



    </form>
    




    <address>vitor marioti</address>
</body>
</html>
